    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @font-face {
            font-family: 'arakom';
            /* Eğer font dosyanızın uzantısı .otf veya .woff ise url kısmını ve formatı buna göre güncelleyin. */
            src: url('arakom.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100dvh; /* Mobil cihazlarda adres çubuğu hesaba katılarak tam ekran sağlar */
            overflow: hidden; /* Ekranda kaydırmayı engeller, tam sığdırır */
            font-family: 'Fredoka', sans-serif;
            background-color: #fff1f2;
            background-image: radial-gradient(#fecaca 1px, transparent 1px);
            background-size: 20px 20px;
            user-select: none;
        }

        .arabic-text {
            font-family: 'arakom', sans-serif !important;
        }

        /* Kelime kutucukları için stiller */
        .word-item {
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation;
        }
        
        .word-item:hover { transform: scale(1.05); }
        .word-item:active { transform: scale(0.95); }

        /* Konfeti animasyonu */
        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        /* Gizleme sınıfı */
        .hidden-screen {
            display: none !important;
        }
    </style>
</head>

            <button id="restart-btn" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-4 px-8 rounded-xl shadow-lg transform transition active:scale-95 text-lg sm:text-xl flex items-center justify-center gap-3 arabic-text">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>

    <script>
        // Soru Verileri
        let questions = [
            { image: "S5_UYANANKIZ.png", correctSentence: "أَسْتَيْقِظُ في الصَّباح مُبَكِّرًا", words: ["أَسْتَيْقِظُ", "في", "الصَّباح", "مُبَكِّرًا"] },
	        { image: "1.png", correctSentence: "أَتَوَضَّأُ ثُمَّ أُصَلّي الفَجْر", words: ["أَتَوَضَّأُ", "ثُمَّ", "أُصَلّي", "الفَجْر"] },
            { image: "S14_AİLESİYLEKAHVALTI.png", correctSentence: "أَتَناوَلُ الفَطور مَع عائِلَتي", words: ["أَتَناوَلُ", "الفَطور", "مَع", "عائِلَتي"] },
            { image: "S14_GİYİNİYORKIZ.png", correctSentence: "أَلْبَسُ مَلابِسي", words: ["أَلْبَسُ", "مَلابِسي"] },
            { image: "S5_OKULAGİDİYORUM.png", correctSentence: "أَذْهَبُ إِلى المَدْرَسَة", words: ["أَذْهَبُ", "إِلى", "المَدْرَسَة"] },
            { image: "S14_EVEGİDİYORUM.png", correctSentence: "أَرْجِعُ إِلى البَيْت ظُهْرًا", words: ["أَرْجِعُ", "إِلى", "البَيْت", "ظُهْرًا"] },
            { image: "S14_ANNESİNEYARDIM.png", correctSentence: "أُساعِدُ أُمّي في البَيْت", words: ["أُساعِدُ", "أُمّي", "في", "البَيْت"] },
            { image: "S14_DERSÇALIŞIYOR.png", correctSentence: "أَدْرُسُ دُروسي مَساءً", words: ["أَدْرُسُ", "دُروسي", "مَساءً"] },
            { image: "S5_YATSIKILIYOR.png", correctSentence: "أُصَلّي العِشاء", words: ["أُصَلّي", "العِشاء"] },
            { image: "S5_UYUYANKIZ.png", correctSentence: "أَنامُ لَيْلًا", words: ["أَنامُ", "لَيْلًا"] }
        ];

        // Değişkenler
        let currentQuestionIndex = 0;
        let score = 0;
        let isQuestionAnswered = false;
        let solvedQuestions = new Set(); 
        
        // Ses
        const startAudio = new Audio('e3.mp3');

        // DOM Elementleri
        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            end: document.getElementById('end-screen')
        };
        const dom = {
            image: document.getElementById('question-image'),
            answer: document.getElementById('answer-container'),
            pool: document.getElementById('word-pool'),
            currentNum: document.getElementById('current-question-num'),
            progress: document.getElementById('progress-bar'),
            checkBtn: document.getElementById('check-btn'),
            nextBtn: document.getElementById('next-btn'),
            prevBtn: document.getElementById('prev-btn'),
            homeBtn: document.getElementById('home-btn'),
            fullBtn: document.getElementById('fullscreen-btn'),
            msgArea: document.getElementById('message-area'),
            scoreDisp: document.getElementById('score-display'),
            finalScore: document.getElementById('final-score'),
            restartBtn: document.getElementById('restart-btn'),
            startBtn: document.getElementById('start-btn')
        };

        // Synth Ayarları
        const clickSynth = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
        const correctSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 } }).toDestination();
        const wrongSynth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.2 } }).toDestination();

        async function playClickSound() { await Tone.start(); clickSynth.triggerAttackRelease("C5", "16n"); }
        async function playCorrectSound() { await Tone.start(); correctSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n"); }
        async function playWrongSound() { await Tone.start(); wrongSynth.triggerAttackRelease("C3", "8n"); }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            isQuestionAnswered = false;
            
            dom.currentNum.textContent = currentQuestionIndex + 1;
            dom.progress.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            
            dom.image.classList.add('opacity-0');
            setTimeout(() => { dom.image.src = q.image; }, 50);

            dom.answer.innerHTML = '';
            dom.pool.innerHTML = '';
            
            let shuffledWords = shuffleArray(q.words);
            while(shuffledWords.join(" ") === q.correctSentence && q.words.length > 1) {
                shuffledWords = shuffleArray(q.words);
            }

            shuffledWords.forEach((word, index) => {
                const wordEl = document.createElement('button');
                wordEl.className = 'word-item bg-white border-2 border-slate-300 text-slate-800 font-bold py-1.5 px-3 sm:py-3 sm:px-5 rounded-lg sm:rounded-xl shadow-sm text-lg sm:text-2xl select-none arabic-text';
                wordEl.textContent = word;
                wordEl.dataset.id = index;
                
                wordEl.addEventListener('click', () => {
                    playClickSound();
                    if (isQuestionAnswered) return;
                    if (wordEl.parentElement === dom.pool) dom.answer.appendChild(wordEl);
                    else if (wordEl.parentElement === dom.answer) dom.pool.appendChild(wordEl);
                });
                dom.pool.appendChild(wordEl);
            });

            showMessage("", "", "");
            
            dom.checkBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            
            // Son soru ise İleri buton metnini "Sonuç" yap
            if (currentQuestionIndex === questions.length - 1) {
                dom.nextBtn.innerHTML = `<span class="arabic-text font-bold text-sm sm:text-lg">النَّتائِج</span> <svg class="w-5 h-5 sm:w-6 sm:h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
            } else {
                dom.nextBtn.innerHTML = `<span class="arabic-text font-bold text-sm sm:text-lg">التّالي</span> <svg class="w-5 h-5 sm:w-6 sm:h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
            }
            dom.nextBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            
            if (currentQuestionIndex === 0) {
                dom.prevBtn.disabled = true;
            } else {
                dom.prevBtn.disabled = false;
            }
        }

        function showMessage(text, textClass, bgClass) {
            dom.msgArea.textContent = text;
            dom.msgArea.className = `h-8 sm:h-10 shrink-0 font-bold text-sm sm:text-lg flex items-center justify-center w-full rounded-lg transition-colors duration-300 arabic-text text-center px-2 ${textClass} ${bgClass}`;
        }

        // Başla Butonu Olayı (Tam Ekran ve Ses)
        dom.startBtn.addEventListener('click', async () => {
            await Tone.start();
            try {
                startAudio.currentTime = 0;
                startAudio.play();
            } catch(e) { console.log('Audio play error:', e); }

            // Tam Ekran İsteği
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                }
            } catch(e) {}

            screens.start.classList.add('hidden-screen');
            screens.game.classList.remove('hidden-screen');
            
            // Oyunu sıfırla ve başlat
            questions = shuffleArray(questions);
            currentQuestionIndex = 0;
            score = 0;
            solvedQuestions.clear();
            dom.scoreDisp.textContent = score;
            loadQuestion();
        });

        // Home (Ana Ekran) Butonu
        dom.homeBtn.addEventListener('click', async () => {
            // Tam ekrandan çık
            try {
                if (document.fullscreenElement) {
                    await document.exitFullscreen();
                }
            } catch(e) {}
            
            startAudio.pause();
            screens.game.classList.add('hidden-screen');
            screens.end.classList.add('hidden-screen');
            screens.start.classList.remove('hidden-screen');
        });

        // Tam Ekran Butonu
        dom.fullBtn.addEventListener('click', async () => {
            try {
                if (!document.fullscreenElement) {
                    await document.documentElement.requestFullscreen();
                } else {
                    await document.exitFullscreen();
                }
            } catch(e) {}
        });

        // Kontrol
        dom.checkBtn.addEventListener('click', () => {
            if (isQuestionAnswered) return;
            if (dom.pool.children.length > 0) {
                 playWrongSound();
                 showMessage("!يُرْجى اِسْتِخْدام جَميع الكَلِمات", "text-orange-700", "bg-orange-100");
                 return;
            }

            const currentItems = [...dom.answer.querySelectorAll('.word-item')];
            const userSentence = currentItems.map(item => item.textContent).join(' ');
            const correctSentence = questions[currentQuestionIndex].correctSentence;

            if (userSentence === correctSentence) {
                playCorrectSound();
                isQuestionAnswered = true;
                
                if (!solvedQuestions.has(currentQuestionIndex)) {
                    score += 10;
                    solvedQuestions.add(currentQuestionIndex);
                    dom.scoreDisp.textContent = score;
                }
                
                showMessage("!رائِع", "text-rose-700", "bg-rose-100");
                
                currentItems.forEach(item => {
                    item.classList.remove('border-slate-300', 'text-slate-800');
                    item.classList.add('border-rose-400', 'bg-rose-50', 'text-rose-800');
                    item.style.cursor = 'default';
                });

                dom.checkBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                dom.nextBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                createConfetti(20);

            } else {
                playWrongSound();
                showMessage("التَّرْتيب خاطِئ، حاوِلْ مَرَّةً أُخْرى!", "text-red-700", "bg-red-100");
                dom.answer.classList.add('animate-pulse');
                setTimeout(() => dom.answer.classList.remove('animate-pulse'), 500);
            }
        });

        // İleri
        dom.nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                screens.end.classList.remove('hidden-screen');
                dom.finalScore.textContent = score;
                if(score === questions.length * 10) createConfetti(100);
            }
        });

        // Geri
        dom.prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });

        // Tekrar Oyna
        dom.restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            solvedQuestions.clear(); 
            dom.scoreDisp.textContent = score;
            screens.end.classList.add('hidden-screen');
            questions = shuffleArray(questions);
            loadQuestion();
        });

        // Konfeti
        function createConfetti(amount) {
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 2 + 's';
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                if (Math.random() > 0.5) confetti.style.borderRadius = '50%';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }
    </script>
</body>
</html>
