<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نًشاط تًكْوين الجُمَل</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <style>
        @font-face {
            font-family: 'arakom';
            /* Eğer font dosyanızın uzantısı .otf veya .woff ise url kısmını ve formatı buna göre güncelleyin. */
            src: url('arakom.ttf') format('truetype'); 
            font-weight: normal;
            font-style: normal;
        }

        @import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600&display=swap');

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #fff1f2; /* Soft kırmızı arka plan */
            background-image: radial-gradient(#fecaca 1px, transparent 1px); /* Desen rengi */
            background-size: 20px 20px;
            user-select: none; /* Metin seçimini engelle */
        }

        .arabic-text {
            font-family: 'arakom', sans-serif;
        }

        /* Kelime kutucukları için stiller */
        .word-item {
            cursor: pointer;
            transition: all 0.2s ease;
            touch-action: manipulation; /* Dokunmatik gecikmeyi önler */
        }
        
        .word-item:hover {
            transform: scale(1.05);
        }
        
        .word-item:active {
            transform: scale(0.95);
        }

        /* Konfeti animasyonu için */
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear infinite;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center py-4 px-2 sm:py-8 sm:px-4 text-slate-800">

    <div class="max-w-4xl w-full bg-white rounded-2xl sm:rounded-3xl shadow-xl overflow-hidden border-2 sm:border-4 border-rose-300">
        
        <!-- Üst Bar: İlerleme, Yönerge ve Puan -->
        <div class="bg-rose-400 text-white p-2 sm:p-4 flex justify-between items-center relative overflow-hidden" dir="rtl">
            
            <!-- Soru Numarası (Sağ) -->
            <div class="relative z-10 flex items-center gap-2 sm:gap-3 shrink-0">
                <div class="bg-white text-rose-500 font-bold w-8 h-8 sm:w-10 sm:h-10 rounded-full flex items-center justify-center text-sm sm:text-xl shadow-inner arabic-text">
                    <span id="current-question-num">1</span>/10
                </div>
            </div>
            
            <!-- Yönerge (Orta) -->
            <div class="relative z-10 text-center flex-1 px-2 arabic-text">
                <p class="text-xs sm:text-sm md:text-lg font-medium tracking-wide drop-shadow-sm leading-tight">اُنْقُرْ عَلى الكَلِمات لِتَرْتيبِها لِتَكْوين جُمْلَة مُفيدَة.</p>
            </div>

            <!-- Puan (Sol) -->
            <div class="relative z-10 flex items-center gap-1 sm:gap-2 arabic-text shrink-0">
                 <span class="font-semibold text-xs sm:text-base md:text-lg bg-white/20 px-2 sm:px-3 py-1 rounded-lg backdrop-blur-sm whitespace-nowrap">النَّتيجَة: <span id="score-display">0</span></span>
            </div>

            <!-- Dekoratif Arka Plan -->
            <div class="absolute -right-10 -top-10 w-24 h-24 sm:w-32 sm:h-32 bg-white opacity-20 rounded-full blur-2xl"></div>
            <div class="absolute right-10 -bottom-10 w-16 h-16 sm:w-24 sm:h-24 bg-rose-300 opacity-30 rounded-full blur-xl"></div>
        </div>

        <!-- İlerleme Çubuğu -->
        <div class="w-full bg-rose-100 h-1.5 sm:h-2">
            <div id="progress-bar" class="bg-rose-500 h-1.5 sm:h-2 transition-all duration-500" style="width: 10%;"></div>
        </div>

        <div class="p-4 sm:p-1 md:p-1 flex flex-col items-center">
            
            <!-- Görsel İpucu Alanı -->
            <div class="w-full max-w-lg h-48 sm:h-72 md:h-96 rounded-xl sm:rounded-2xl overflow-hidden shadow-md mb-1 sm:mb-1 border-2 sm:border-4 border-slate-100 relative bg-slate-50 flex items-center justify-center">
                <!-- Fallback ikonu (Resim yüklenmezse diye) -->
                <svg id="image-fallback" class="w-12 h-12 sm:w-20 sm:h-20 text-slate-300 absolute" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                
                <img id="question-image" src="" alt="صُورَة السُّؤال" class="w-full h-full object-cover object-center relative z-10 transition-opacity duration-300 opacity-0" onload="this.classList.remove('opacity-0')">
            </div>

            <!-- Kullanıcı Mesaj Alanı -->
            <div id="message-area" class="h-auto min-h-[2.5rem] py-1 mb-1 sm:mb-0 font-semibold text-sm sm:text-lg flex items-center justify-center w-full rounded-lg transition-colors duration-300 arabic-text text-center px-2">

            </div>

            <!-- Cevap Alanı -->
            <div id="answer-container" dir="rtl" class="flex flex-wrap justify-center content-start gap-1 sm:gap-1 w-full min-h-[70px] sm:min-h-[90px] p-1 sm:p-2 bg-white rounded-lg sm:rounded-xl border-2 border-dashed border-rose-300 mb-1 sm:mb-1 shadow-inner arabic-text">
                <!-- Seçilen kelimeler buraya gelecek -->
            </div>

            <!-- Kelime Havuzu -->
            <div id="word-pool" dir="rtl" class="flex flex-wrap justify-center gap-2 sm:gap-3 w-full min-h-[70px] sm:min-h-[90px] p-1 sm:p-2 bg-slate-50 rounded-lg sm:rounded-xl border-2 border-slate-200 mb-1 sm:mb-2 arabic-text">
                <!-- Karışık kelimeler buraya eklenecek -->
            </div>

            <!-- Kontrol Butonları -->
            <div class="flex justify-between items-center w-full gap-2 sm:gap-4 arabic-text" dir="rtl">
                
                <!-- Geri Butonu (RTL düzeninde en sağda yer alır) -->
                <button id="prev-btn" class="bg-rose-100 hover:bg-rose-200 text-rose-700 font-bold py-2 px-3 sm:py-3 sm:px-6 rounded-full shadow-sm transform transition active:scale-95 flex items-center gap-1 sm:gap-2 disabled:opacity-50 disabled:cursor-not-allowed text-xs sm:text-base md:text-lg">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                    السّابِق
                </button>

                <!-- Kontrol Butonu (Ortada) -->
                <button id="check-btn" class="bg-rose-500 hover:bg-rose-600 active:bg-rose-700 text-white font-bold py-2 px-5 sm:py-3 sm:px-8 rounded-full shadow-lg transform transition active:scale-95 flex items-center gap-1 sm:gap-2 text-sm sm:text-base md:text-lg">
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path></svg>
                    اِخْتَبِرْ
                </button>

                <!-- İleri Butonu (RTL düzeninde en solda yer alır, varsayılan olarak inaktif) -->
                <button id="next-btn" class="bg-rose-500 hover:bg-rose-600 active:bg-rose-700 text-white font-bold py-2 px-3 sm:py-3 sm:px-6 rounded-full shadow-lg transform transition active:scale-95 flex items-center gap-1 sm:gap-2 opacity-50 cursor-not-allowed pointer-events-none text-xs sm:text-base md:text-lg">
                    التّالي
                    <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                </button>

            </div>

        </div>
    </div>

    <!-- Oyun Sonu Ekranı (Başlangıçta Gizli) -->
    <div id="end-screen" class="hidden fixed inset-0 bg-black bg-opacity-80 z-50 flex items-center justify-center p-4 backdrop-blur-sm arabic-text" dir="rtl">
        <div class="bg-white p-6 sm:p-8 rounded-2xl sm:rounded-3xl max-w-md w-full text-center shadow-2xl transform transition-all scale-100">
            <h2 class="text-3xl sm:text-4xl font-bold text-rose-500 mb-2">مُبارَك!</h2>
            <p class="text-lg sm:text-xl text-slate-600 mb-4 sm:mb-6">لَقَد أَكْمَلْت النَّشاط.</p>
            
            <div class="bg-slate-50 rounded-xl sm:rounded-2xl p-4 sm:p-6 mb-6 sm:mb-8 border-2 border-slate-100">
                <p class="text-base sm:text-lg text-slate-500 mb-1">مَجْموع نِقاطِك</p>
                <p class="text-4xl sm:text-5xl font-extrabold text-rose-500" id="final-score">100</p>
            </div>

            <button id="restart-btn" class="w-full bg-rose-500 hover:bg-rose-600 text-white font-bold py-3 sm:py-4 px-6 sm:px-8 rounded-xl shadow-lg transform transition active:scale-95 text-base sm:text-lg flex items-center justify-center gap-2">
                <svg class="w-5 h-5 sm:w-6 sm:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15"></path></svg>
                اِلْعَبْ مَرَّةً أُخْرى
            </button>
        </div>
    </div>

    <script>
        // Soru Verileri: 10 Soru (Arapça)
        let questions = [
            {
                image: "S5_UYANANKIZ.png",
                correctSentence: "أَسْتَيْقِظُ في الصَّباح مُبَكِّرًا",
                words: ["أَسْتَيْقِظُ", "في", "الصَّباح", "مُبَكِّرًا"]
            },
	        {
                image: "1.png",
                correctSentence: "أَتَوَضَّأُ ثُمَّ أُصَلّي الفَجْر",
                words: ["أَتَوَضَّأُ", "ثُمَّ", "أُصَلّي", "الفَجْر"]
            },
            {
                image: "S14_AİLESİYLEKAHVALTI.png",
                correctSentence: "أَتَناوَلُ الفَطور مَع عائِلَتي",
                words: ["أَتَناوَلُ", "الفَطور", "مَع", "عائِلَتي"]
            },
            {
                image: "S14_GİYİNİYORKIZ.png",
                correctSentence: "أَلْبَسُ مَلابِسي",
                words: ["أَلْبَسُ", "مَلابِسي"]
            },
            {
                image: "S5_OKULAGİDİYORUM.png",
                correctSentence: "أَذْهَبُ إِلى المَدْرَسَة",
                words: ["أَذْهَبُ", "إِلى", "المَدْرَسَة"]
            },
            {
                image: "S14_EVEGİDİYORUM.png",
                correctSentence: "أَرْجِعُ إِلى البَيْت ظُهْرًا",
                words: ["أَرْجِعُ", "إِلى", "البَيْت", "ظُهْرًا"]
            },
            {
                image: "S14_ANNESİNEYARDIM.png",
                correctSentence: "أُساعِدُ أُمّي في البَيْت",
                words: ["أُساعِدُ", "أُمّي", "في", "البَيْت"]
            },
            {
                image: "S14_DERSÇALIŞIYOR.png",
                correctSentence: "أَدْرُسُ دُروسي مَساءً",
                words: ["أَدْرُسُ", "دُروسي", "مَساءً"]
            },
            {
                image: "S5_YATSIKILIYOR.png",
                correctSentence: "أُصَلّي العِشاء",
                words: ["أُصَلّي", "العِشاء"]
            },
            {
                image: "S5_UYUYANKIZ.png",
                correctSentence: "أَنامُ لَيْلًا",
                words: ["أَنامُ", "لَيْلًا"]
            }
        ];

        // Durum Değişkenleri
        let currentQuestionIndex = 0;
        let score = 0;
        let isQuestionAnswered = false;
        let solvedQuestions = new Set(); // Çözülen soruları takip ederek puan hilesini önlemek için

        // DOM Elementleri
        const questionImage = document.getElementById('question-image');
        const answerContainer = document.getElementById('answer-container');
        const wordPool = document.getElementById('word-pool');
        const currentNumEl = document.getElementById('current-question-num');
        const progressBar = document.getElementById('progress-bar');
        const checkBtn = document.getElementById('check-btn');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const messageArea = document.getElementById('message-area');
        const scoreDisplay = document.getElementById('score-display');
        const endScreen = document.getElementById('end-screen');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        // Ses Efektleri Sentezleyicileri
        const clickSynth = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
        }).toDestination();

        const correctSynth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 }
        }).toDestination();

        const wrongSynth = new Tone.MembraneSynth({
            pitchDecay: 0.05,
            octaves: 2,
            oscillator: { type: "square" },
            envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.2 }
        }).toDestination();

        // Çalma Fonksiyonları
        async function playClickSound() { await Tone.start(); clickSynth.triggerAttackRelease("C5", "16n"); }
        async function playCorrectSound() { await Tone.start(); correctSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n"); }
        async function playWrongSound() { await Tone.start(); wrongSynth.triggerAttackRelease("C3", "8n"); }

        // Diziyi rastgele karıştırma fonksiyonu (Fisher-Yates)
        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        // Soruyu Yükle
        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            isQuestionAnswered = false;
            
            // UI Güncelleme
            currentNumEl.textContent = currentQuestionIndex + 1;
            progressBar.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            
            // Görseli yükle
            questionImage.classList.add('opacity-0');
            setTimeout(() => {
                questionImage.src = q.image;
            }, 50);

            // Konteynerleri temizle
            answerContainer.innerHTML = '';
            wordPool.innerHTML = '';
            
            // Kelimeleri karıştır
            let shuffledWords = shuffleArray(q.words);
            
            // Orjinal sıraya denk gelirse tekrar karıştır
            while(shuffledWords.join(" ") === q.correctSentence && q.words.length > 1) {
                shuffledWords = shuffleArray(q.words);
            }

            shuffledWords.forEach((word, index) => {
                const wordEl = document.createElement('button');
                // Responsive kelime kutucuğu sınıfları
                wordEl.className = 'word-item bg-white border-2 border-slate-300 text-slate-800 font-bold py-2 px-3 sm:py-3 sm:px-5 md:py-4 md:px-6 rounded-lg sm:rounded-xl shadow-sm text-lg sm:text-2xl md:text-3xl select-none';
                wordEl.textContent = word;
                wordEl.dataset.id = index;
                
                // Tıklama olayı
                wordEl.addEventListener('click', () => {
                    playClickSound(); // Ses efektini çal
                    handleWordClick(wordEl);
                });
                
                wordPool.appendChild(wordEl);
            });

            // Mesaj durumunu sıfırla
            showMessage("", "text-slate-700", "bg-transparent");
            
            // Buton durumlarını güncelle
            checkBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            
            // İleri butonunun ikonu ve metni (responsive ikon boyutuyla)
            nextBtn.innerHTML = `التّالي <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>`;
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            
            if (currentQuestionIndex === 0) {
                prevBtn.disabled = true;
                prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                prevBtn.disabled = false;
                prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        // Tıklama ile kelime taşıma işlemi
        function handleWordClick(wordEl) {
            if (isQuestionAnswered) return;

            // Eğer kelime havuzundaysa cevap alanına taşı
            if (wordEl.parentElement === wordPool) {
                answerContainer.appendChild(wordEl);
            } 
            // Eğer cevap alanındaysa kelime havuzuna geri taşı
            else if (wordEl.parentElement === answerContainer) {
                wordPool.appendChild(wordEl);
            }
        }

        // Mesaj Gösterme Yardımcısı
        function showMessage(text, textClass, bgClass) {
            messageArea.textContent = text;
            messageArea.className = `h-auto min-h-[2.5rem] py-1 mb-2 sm:mb-4 font-bold text-sm sm:text-lg flex items-center justify-center w-full rounded-lg transition-colors duration-300 text-center px-2 ${textClass} ${bgClass}`;
        }

        // Cevabı Kontrol Et
        checkBtn.addEventListener('click', () => {
            if (isQuestionAnswered) return;

            // Eksik kelime kontrolü
            if (wordPool.children.length > 0) {
                 playWrongSound(); // Uyarı sesi
                 showMessage("!يُرْجى اِسْتِخْدام جَميع الكَلِمات", "text-orange-700", "bg-orange-100");
                 return;
            }

            const currentItems = [...answerContainer.querySelectorAll('.word-item')];
            const userSentence = currentItems.map(item => item.textContent).join(' ');
            const correctSentence = questions[currentQuestionIndex].correctSentence;

            if (userSentence === correctSentence) {
                // Doğru Cevap
                playCorrectSound(); // Doğru sesi
                isQuestionAnswered = true;
                
                // Puanı yalnızca soru ilk kez doğru cevaplandığında ver
                if (!solvedQuestions.has(currentQuestionIndex)) {
                    score += 10;
                    solvedQuestions.add(currentQuestionIndex);
                    scoreDisplay.textContent = score;
                }
                
                showMessage("!رائِع", "text-rose-700", "bg-rose-100");
                
                currentItems.forEach(item => {
                    item.classList.remove('border-slate-300', 'text-slate-800');
                    item.classList.add('border-rose-400', 'bg-rose-50', 'text-rose-800');
                    item.style.cursor = 'default';
                });

                // Kontrol butonunu devre dışı bırak, İleri butonunu aktifleştir
                checkBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                
                if (currentQuestionIndex === questions.length - 1) {
                    nextBtn.innerHTML = `النَّتائِج <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>`;
                }
                
                createConfetti(20);

            } else {
                // Yanlış Cevap
                playWrongSound(); // Yanlış sesi
                showMessage("التَّرْتيب خاطِئ، حاوِلْ مَرَّةً أُخْرى!", "text-red-700", "bg-red-100");
                
                answerContainer.classList.add('animate-pulse');
                setTimeout(() => answerContainer.classList.remove('animate-pulse'), 500);
            }
        });

        // İleri Butonu
        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showEndScreen();
            }
        });

        // Geri Butonu
        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });

        // Oyun Sonu Ekranı
        function showEndScreen() {
            endScreen.classList.remove('hidden');
            finalScoreEl.textContent = score;
            if(score === questions.length * 10) {
                createConfetti(100);
            }
        }

        // Tekrar Oyna
        restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            solvedQuestions.clear(); // Kaydedilen doğruları sıfırla
            scoreDisplay.textContent = score;
            endScreen.classList.add('hidden');
            questions = shuffleArray(questions); // Soruları yeniden karıştır
            loadQuestion();
        });

        // Konfeti Efekti
        function createConfetti(amount) {
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                // Rastgele pozisyon, renk ve animasyon gecikmesi
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                
                // Farklı şekiller
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }

                document.body.appendChild(confetti);
                
                // Animasyon bitince temizle
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }

        // Oyunu Başlat
        window.onload = () => {
            questions = shuffleArray(questions); // Başlangıçta soruları karıştır
            loadQuestion();
        };

    </script>
</body>
</html>
