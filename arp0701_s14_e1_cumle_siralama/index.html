        /* Confetti animation */
        @keyframes fall {
            0% { transform: translateY(-100vh) rotate(0deg); }
            100% { transform: translateY(100vh) rotate(360deg); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            animation: fall 3s linear infinite;
            z-index: 100;
            pointer-events: none;
        }

        /* Wiggle/Shake animation for wrong answers */
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
        .shake-effect {
            animation: shake 0.4s ease-in-out;
        }

        /* SVG scale safeguard inside list cards */

                    envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
                }).toDestination();

                correctSynth = new Tone.PolySynth(Tone.Synth, {
                    oscillator: { type: "triangle" },
                    envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.8 }
                }).toDestination();

                wrongSynth = new Tone.MembraneSynth({
                    pitchDecay: 0.05,
                    octaves: 2,
                    oscillator: { type: "square" },
                    envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.2 }
                }).toDestination();
                audioSupported = true;
            }
        } catch (e) {
            console.warn("Tone.js setup failed:", e);
        }

        const introAudio = new Audio('e1.mp3');
        let introAudioPlayed = false;

        function playIntroAudio() {
            if (introAudioPlayed) return;
            introAudio.play().then(() => {
                introAudioPlayed = true;
            }).catch(err => {
                console.warn("Otomatik ses oynatılamadı. Etkileşim bekleniyor.", err);
            });
        }

        async function playClickSound() { 
            if (!audioSupported) return;
            try { await Tone.start(); if (clickSynth) clickSynth.triggerAttackRelease("C5", "16n"); } catch (e) {} 
        }
        async function playCorrectSound() { 
            if (!audioSupported) return;
            try { await Tone.start(); if (correctSynth) correctSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n"); } catch (e) {} 
        }
        async function playWrongSound() { 
            if (!audioSupported) return;
            try { await Tone.start(); if (wrongSynth) wrongSynth.triggerAttackRelease("C3", "8n"); } catch (e) {} 
        }

        const columnRight = document.getElementById('column-right');
        const columnLeft = document.getElementById('column-left');
        const statusMessage = document.getElementById('status-message');
        const scoreDisplay = document.getElementById('score-display');
        const progressBar = document.getElementById('progress-bar');
        const checkBtn = document.getElementById('check-btn');
        const clearBtn = document.getElementById('clear-btn');
        const endScreen = document.getElementById('end-screen');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');

        const fullscreenBtn = document.getElementById('fullscreen-btn');
        const fullscreenIconEnter = document.getElementById('fullscreen-icon-enter');
        const fullscreenIconExit = document.getElementById('fullscreen-icon-exit');

        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');

        // Başla Butonu Mantığı
        startBtn.addEventListener('click', async () => {
            // Sesi başlat (tarayıcı izni için)
            if (audioSupported) {
                try {
                    await Tone.start();
                    if (clickSynth) clickSynth.triggerAttackRelease("C5", "16n");
                } catch(e){}
            }
            // Tam ekrana geç
            triggerAutoFullscreen();
            // Sesli yönergeyi çal
            playIntroAudio();
            // Başlangıç ekranını gizle
            startScreen.classList.add('hidden');
        });


        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function initGame() {
            hasChecked = false;
            const correctOrder = routineSteps.map(step => step.correctSentence);
            let shuffled = shuffleArray(correctOrder);
            while (shuffled.every((sentence, idx) => sentence === correctOrder[idx])) {
                shuffled = shuffleArray(correctOrder);
            }
            placedSentences = shuffled;
            scoreDisplay.textContent = "٠";
            progressBar.style.width = "0%";
            showStatus("", "text-slate-600", "bg-slate-100");
            renderGameBoard();
            updateProgress();
        }

        function openImageModal(index) {
            const step = routineSteps[index];
            const modal = document.getElementById('image-modal');
            const modalImg = document.getElementById('modal-enlarged-image');
            const modalFallback = document.getElementById('modal-fallback-svg');
            
            if (step.image && step.image !== "" && !step.image.includes("undefined")) {
                modalImg.src = step.image;
                modalImg.classList.remove('hidden');
                modalFallback.classList.add('hidden');
                modalImg.onerror = () => {
                    modalImg.classList.add('hidden');
                    modalFallback.innerHTML = step.fallbackIcon;
                    modalFallback.classList.remove('hidden');
                };
            } else {
                modalImg.classList.add('hidden');
                modalFallback.innerHTML = step.fallbackIcon;
                modalFallback.classList.remove('hidden');
            }
            modal.classList.remove('hidden');
        }

        function closeImageModal() {
            document.getElementById('image-modal').classList.add('hidden');
        }

        function renderGameBoard() {
            columnRight.innerHTML = '';
            columnLeft.innerHTML = '';

            routineSteps.forEach((step, index) => {
                const currentSentence = placedSentences[index];
                
                const card = document.createElement('div');
                card.id = `slot-card-${index}`;
                // Kart yüksekliğini min-h yaparak dinamik büyümesine izin verildi.
                card.className = "interactive-card bg-white rounded-xl sm:rounded-2xl border border-slate-200 p-1.5 sm:p-2 flex items-stretch gap-2 sm:gap-3 shadow-sm w-full transition-all duration-300 min-h-[68px] sm:min-h-[76px]";
                
                card.innerHTML = `
                    <div id="image-box-${index}" onclick="event.stopPropagation(); playClickSound(); openImageModal(${index})" class="flex items-center justify-center gap-1.5 sm:gap-2.5 bg-rose-50/50 border border-rose-100/50 rounded-lg p-1 w-[80px] sm:w-[110px] shrink-0 transition-all duration-300 cursor-zoom-in hover:bg-rose-100" title="Zoom">
                        <div class="w-6 h-6 sm:w-9 sm:h-9 rounded-full bg-rose-100 border border-rose-200 flex items-center justify-center font-bold text-rose-600 text-[11px] sm:text-sm arabic-text shrink-0">
                            ${step.arabicNum}
                        </div>
                        <div class="w-8 h-8 sm:w-12 sm:h-12 rounded-md bg-slate-100 overflow-hidden border border-slate-200 flex items-center justify-center shrink-0 relative shadow-inner">
                            <img src="${step.image}" alt="${step.stepName}" class="w-full h-full object-cover transition-opacity duration-300 opacity-0 absolute inset-0" onload="this.classList.remove('opacity-0')" onerror="this.style.display='none'; this.nextElementSibling.classList.remove('hidden');">
                            <div class="hidden absolute inset-0 flex items-center justify-center">${step.fallbackIcon}</div>
                        </div>
                    </div>

                    <div id="sentence-box-${index}" class="flex-1 flex items-center justify-between gap-2 border border-rose-100/40 bg-rose-50/15 rounded-md p-1.5 sm:p-2 transition-colors duration-300">
                        <!-- Metin alanı sığmazsa taşmak yerine aşağı insin diye truncate kaldırıldı -->
                        <div class="flex-1 text-right">
                            <span class="arabic-text text-[14px] sm:text-[18px] md:text-[22px] text-slate-800 font-extrabold leading-snug whitespace-normal block" dir="rtl" title="${currentSentence}">${currentSentence}</span>
                        </div>

                        <!-- Butonlar dikey hizalanarak yer kazancı sağlandı -->
                        <div class="flex flex-col gap-1 shrink-0 justify-center items-center bg-slate-50 border border-slate-100 rounded-md p-1 h-full">
                            <button onclick="event.stopPropagation(); playClickSound(); moveSentence(${index}, 'up');" class="w-6 h-6 sm:w-8 sm:h-8 rounded bg-white hover:bg-rose-50 text-slate-500 hover:text-rose-600 transition flex items-center justify-center border border-slate-100 shadow-sm ${index === 0 ? 'opacity-20 cursor-not-allowed pointer-events-none' : 'hover:scale-105 active:scale-95'}" title="Up">
                                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M5 15l7-7 7 7"></path>
                                </svg>
                            </button>
                            <button onclick="event.stopPropagation(); playClickSound(); moveSentence(${index}, 'down');" class="w-6 h-6 sm:w-8 sm:h-8 rounded bg-white hover:bg-rose-50 text-slate-500 hover:text-rose-600 transition flex items-center justify-center border border-slate-100 shadow-sm ${index === 9 ? 'opacity-20 cursor-not-allowed pointer-events-none' : 'hover:scale-105 active:scale-95'}" title="Down">
                                <svg class="w-3.5 h-3.5 sm:w-4 sm:h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3.5" d="M19 9l-7 7-7-7"></path>
                                </svg>
                            </button>
                        </div>
                    </div>
                `;

                if (index < 5) {
                    columnRight.appendChild(card);
                } else {
                    columnLeft.appendChild(card);
                }
            });
        }

        function moveSentence(index, direction) {
            const targetIndex = index + (direction === 'up' ? -1 : 1);
            if (targetIndex < 0 || targetIndex >= 10) return;

            if (hasChecked) {
                hasChecked = false;
                resetHighlights();
            }

            const temp = placedSentences[index];
            placedSentences[index] = placedSentences[targetIndex];
            placedSentences[targetIndex] = temp;

            updateProgress();
            renderGameBoard();

            const card1 = document.getElementById(`slot-card-${index}`);
            const card2 = document.getElementById(`slot-card-${targetIndex}`);
            if (card1 && card2) {
                card1.classList.add('bg-amber-50', 'border-amber-300', 'scale-[1.01]');
                card2.classList.add('bg-amber-50', 'border-amber-300', 'scale-[1.01]');
                setTimeout(() => {
                    card1.classList.remove('bg-amber-50', 'border-amber-300', 'scale-[1.01]');
                    card2.classList.remove('bg-amber-50', 'border-amber-300', 'scale-[1.01]');
                }, 300);
            }
        }

        function resetHighlights() {
            routineSteps.forEach((_, index) => {
                const card = document.getElementById(`slot-card-${index}`);
                const imageBox = document.getElementById(`image-box-${index}`);
                const sentenceBox = document.getElementById(`sentence-box-${index}`);
                
                if (card) {
                    card.classList.remove('border-emerald-500', 'bg-emerald-50/10', 'border-red-400', 'bg-red-50/10', 'shake-effect');
                    card.classList.add('border-slate-200');
                }
                if (imageBox) {
                    imageBox.classList.remove('border-emerald-500/50', 'bg-emerald-100/50', 'border-red-400/50', 'bg-red-100/50');
                    imageBox.classList.add('bg-rose-50/50', 'border-rose-100/50');
                }
                if (sentenceBox) {
                    sentenceBox.classList.remove('border-emerald-500/50', 'bg-emerald-50/30', 'border-red-400/50', 'bg-red-50/30');
                    sentenceBox.classList.add('border-rose-100/40', 'bg-rose-50/15');
                }
            });
        }

        function updateProgress() {
            let correctCount = 0;
            routineSteps.forEach((step, index) => {
                if (placedSentences[index] === step.correctSentence) {
                    correctCount++;
                }
            });
            const percentage = (correctCount / 10) * 100;
            progressBar.style.width = `${percentage}%`;
        }

        function showStatus(text, textClass, bgClass) {
            statusMessage.textContent = text;
            statusMessage.className = `w-full sm:w-auto p-2 text-center text-[13px] sm:text-sm rounded-lg font-semibold transition-all duration-300 border min-h-[38px] flex items-center justify-center arabic-text flex-1 ${textClass} ${bgClass}`;
        }

        clearBtn.addEventListener('click', () => {
            playClickSound();
            initGame();
        });

        checkBtn.addEventListener('click', () => {
            let correctCount = 0;
            hasChecked = true;
            
            routineSteps.forEach((step, index) => {
                const userSentence = placedSentences[index];
                const isCorrect = userSentence === step.correctSentence;
                const cardElement = document.getElementById(`slot-card-${index}`);
                const imageBox = document.getElementById(`image-box-${index}`);
                const sentenceBox = document.getElementById(`sentence-box-${index}`);

                if (cardElement) {
                    cardElement.classList.remove('border-slate-200', 'border-emerald-500', 'bg-emerald-50/10', 'border-red-400', 'bg-red-50/10', 'shake-effect');
                    
                    if (isCorrect) {
                        correctCount++;
                        cardElement.classList.add('border-emerald-500', 'bg-emerald-50/10');
                        if (imageBox) {
                            imageBox.classList.remove('bg-rose-50/50', 'border-rose-100/50');
                            imageBox.classList.add('border-emerald-500/50', 'bg-emerald-100/50');
                        }
                        if (sentenceBox) {
                            sentenceBox.classList.remove('border-rose-100/40', 'bg-rose-50/15');
                            sentenceBox.classList.add('border-emerald-500/50', 'bg-emerald-50/30');
                        }
                    } else {
                        cardElement.classList.add('border-red-400', 'bg-red-50/10', 'shake-effect');
                        if (imageBox) {
                            imageBox.classList.remove('bg-rose-50/50', 'border-rose-100/50');
                            imageBox.classList.add('border-red-400/50', 'bg-red-100/50');
                        }
                        if (sentenceBox) {
                            sentenceBox.classList.remove('border-rose-100/40', 'bg-rose-50/15');
                            sentenceBox.classList.add('border-red-400/50', 'bg-red-50/30');
                        }
                        setTimeout(() => cardElement.classList.remove('shake-effect'), 500);
                    }
                }
            });

            updateProgress();
            const finalScore = correctCount * 10;
            scoreDisplay.textContent = convertToArabicNumeral(finalScore);

            if (correctCount === 10) {
                playCorrectSound();
                showStatus("مُمْتَازٌ! كُلُّ الإِجَابَاتِ صَحِيحَةٌ!", "text-emerald-700", "bg-emerald-100 border-emerald-300");
                createConfetti(50);
                setTimeout(showEndScreen, 1500);
            } else {
                playWrongSound();
                showStatus(`حَاوِلْ مَرَّةً أُخْرَى! لَدَيْكَ ${convertToArabicNumeral(correctCount)} إِجَابَاتٍ صَحِيحَةٍ.`, "text-red-700", "bg-red-100 border-red-300");
            }
        });

        function convertToArabicNumeral(number) {
            const map = {
                '0': '٠', '1': '١', '2': '٢', '3': '٣', '4': '٤',
                '5': '٥', '6': '٦', '7': '٧', '8': '٨', '9': '٩'
            };
            return number.toString().split('').map(char => map[char] || char).join('');
        }

        function createConfetti(amount) {
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 1.5 + 's';
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                if (Math.random() > 0.5) confetti.style.borderRadius = '50%';
                document.body.appendChild(confetti);
                setTimeout(() => confetti.remove(), 4000);
            }
        }

        function showEndScreen() {
            endScreen.classList.remove('hidden');
            finalScoreEl.textContent = "١٠٠ / ١٠٠";
            createConfetti(80);
        }

        restartBtn.addEventListener('click', () => {
            endScreen.classList.add('hidden');
            introAudioPlayed = false;
            playIntroAudio();
            initGame();
        });

        function enterFullscreen() {
            const docEl = document.documentElement;
            if (docEl.requestFullscreen) docEl.requestFullscreen().catch(() => {});
            else if (docEl.webkitRequestFullscreen) docEl.webkitRequestFullscreen();
            else if (docEl.mozRequestFullScreen) docEl.mozRequestFullScreen();
            else if (docEl.msRequestFullscreen) docEl.msRequestFullscreen();
        }

        function exitFullscreen() {
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
            else if (document.webkitExitFullscreen) document.webkitExitFullscreen();
            else if (document.mozCancelFullScreen) document.mozCancelFullScreen();
            else if (document.msExitFullscreen) document.msExitFullscreen();
        }

        function toggleFullscreen() {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
            if (!isFS) enterFullscreen();
            else exitFullscreen();
        }

        fullscreenBtn.addEventListener('click', () => {
            playClickSound();
            toggleFullscreen();
        });

        const handleFullscreenChange = () => {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
            if (isFS) {
                fullscreenIconEnter.classList.add('hidden');
                fullscreenIconExit.classList.remove('hidden');
            } else {
                fullscreenIconEnter.classList.remove('hidden');
                fullscreenIconExit.classList.add('hidden');
            }
        };

        document.addEventListener('fullscreenchange', handleFullscreenChange);
        document.addEventListener('webkitfullscreenchange', handleFullscreenChange);
        document.addEventListener('mozfullscreenchange', handleFullscreenChange);
        document.addEventListener('MSFullscreenChange', handleFullscreenChange);

        function triggerAutoFullscreen() {
            const isFS = document.fullscreenElement || document.webkitFullscreenElement || document.mozFullScreenElement || document.msFullscreenElement;
            if (!isFS) enterFullscreen();
        }

        // Oyun ilk açıldığında tahtayı hazırlar fakat arka planda bekletir.
        window.onload = () => {
            initGame();
        };
    </script>
</body>
</html>
