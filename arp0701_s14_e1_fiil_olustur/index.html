        @font-face {

        /* Çocuk dostu Arapça ve Latince font entegrasyonu */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@600;700;800&family=Fredoka:wght@400;500;600&display=swap');

        body {
            font-family: 'Fredoka', sans-serif;
            background-color: #f0f9ff;
            background-image: radial-gradient(#bae6fd 1px, transparent 1px);
            background-size: 20px 20px;
            user-select: none;
            overflow: hidden; /* Dışarı taşmayı/kaydırmayı engelle */

        /* Tüm Arapça metinleri Arakom yapmaya zorla */
        .arabic-text {
            font-family: 'arakom', 'Cairo', sans-serif !important;
        }

        .word-item {
            cursor: pointer;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            touch-action: manipulation;
        }
        
        .word-item:hover {
            transform: scale(1.08);
        }
        
        .word-item:active {
            transform: scale(0.92);
        }

        @keyframes fall {
            0% { transform: translateY(-10vh) rotate(0deg); }
            100% { transform: translateY(110vh) rotate(360deg); }
        }
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background-color: #f00;
            animation: fall 3s linear infinite;
            z-index: 100;
            pointer-events: none;
        }
    </style>
</head>

    <script>
        let questions = [
            { image: "S5_UYANANKIZ.png", verb: "أَسْتَيْقِظُ", letters: ["أَ", "سْ", "تَ", "يْ", "قِ", "ظُ"], sentenceRest: "في الصَّباح مُبَكِّرًا." },
	        { image: "1.png", verb: "أَتَوَضَّأُ", letters: ["أَ", "تَ", "وَ", "ضَّ", "أُ"], sentenceRest: "ثُمَّ أُصَلّي الفَجْر." },
            { image: "S14_AİLESİYLEKAHVALTI.png", verb: "أَتَناوَلُ", letters: ["أَ", "تَ", "ن", "ا", "وَ", "لُ"], sentenceRest: "الفَطور مَع عائِلَتي." },
            { image: "S14_GİYİNİYORKIZ.png", verb: "أَلْبَسُ", letters: ["أَ", "لْ", "بَ", "سُ"], sentenceRest: "مَلابِسي." },
            { image: "S5_OKULAGİDİYORUM.png", verb: "أَذْهَبُ", letters: ["أَ", "ذْ", "هَ", "بُ"], sentenceRest: "إِلى المَدْرَسَة." },
            { image: "S14_EVEGİDİYORUM.png", verb: "أَرْجِعُ", letters: ["أَ", "رْ", "جِ", "عُ"], sentenceRest: "إِلى البَيْت ظُهْرًا." },
            { image: "S14_ANNESİNEYARDIM.png", verb: "أُساعِدُ", letters: ["أُ", "س", "ا", "عِ", "دُ"], sentenceRest: "أُمّي في البَيْت." },
            { image: "S14_DERSÇALIŞIYOR.png", verb: "أَدْرُسُ", letters: ["أَ", "دْ", "رُ", "سُ"], sentenceRest: "دُروسي مَساءً." },
            { image: "S5_YATSIKILIYOR.png", verb: "أُصَلّي", letters: ["أُ", "صَ", "لّ", "ي"], sentenceRest: "العِشاء." },
            { image: "S5_UYUYANKIZ.png", verb: "أَنامُ", letters: ["أَ", "ن", "ا", "مُ"], sentenceRest: "لَيْلًا." }
        ];

        let currentQuestionIndex = 0;
        let score = 0;
        let isQuestionAnswered = false;
        let solvedQuestions = new Set(); 
        let poolLetters = [];      
        let selectedLetters = [];  

        const questionImage = document.getElementById('question-image');
        const answerContainer = document.getElementById('answer-container');
        const sentenceRest = document.getElementById('sentence-rest');
        const wordPool = document.getElementById('word-pool');
        const currentNumEl = document.getElementById('current-question-num');
        const progressBar = document.getElementById('progress-bar');
        const checkBtn = document.getElementById('check-btn');
        const nextBtn = document.getElementById('next-btn');
        const prevBtn = document.getElementById('prev-btn');
        const messageArea = document.getElementById('message-area');
        const scoreDisplay = document.getElementById('score-display');
        const endScreen = document.getElementById('end-screen');
        const finalScoreEl = document.getElementById('final-score');
        const restartBtn = document.getElementById('restart-btn');
        const startScreen = document.getElementById('start-screen');
        const startBtn = document.getElementById('start-btn');
        const fullscreenBtn = document.getElementById('fullscreen-toggle-btn');

        const clickSynth = new Tone.Synth({
            oscillator: { type: "sine" },
            envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 }
        }).toDestination();

        const correctSynth = new Tone.PolySynth(Tone.Synth, {
            oscillator: { type: "triangle" },
            envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 1 }
        }).toDestination();

        const wrongSynth = new Tone.MembraneSynth({
            pitchDecay: 0.05,
            octaves: 2,
            oscillator: { type: "square" },
            envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.2 }
        }).toDestination();

        async function playClickSound() { await Tone.start(); clickSynth.triggerAttackRelease("C5", "16n"); }
        async function playCorrectSound() { await Tone.start(); correctSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n"); }
        async function playWrongSound() { await Tone.start(); wrongSynth.triggerAttackRelease("C3", "8n"); }

        function shuffleArray(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        startBtn.addEventListener('click', async () => {
            // Yönerge sesini oynat
            const instructionAudio = new Audio('e2.mp3');
            instructionAudio.play().catch(e => console.log("Ses oynatılamadı:", e));

            await Tone.start();
            playClickSound();
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran yapılamadı: ${err.message}`);
                });
            }
            startScreen.classList.add('opacity-0');
            setTimeout(() => {
                startScreen.classList.add('hidden');
            }, 500); 
        });

        fullscreenBtn.addEventListener('click', () => {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(err => {
                    console.log(`Tam ekran yapılamadı: ${err.message}`);
                });
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                }
            }
        });

        function loadQuestion() {
            const q = questions[currentQuestionIndex];
            isQuestionAnswered = false;
            
            currentNumEl.textContent = currentQuestionIndex + 1;
            progressBar.style.width = `${((currentQuestionIndex + 1) / questions.length) * 100}%`;
            
            questionImage.classList.add('opacity-0');
            setTimeout(() => { questionImage.src = q.image; }, 50);

            sentenceRest.textContent = q.sentenceRest;

            const letterObjects = q.letters.map((l, idx) => ({ id: idx, letter: l }));
            selectedLetters = [];
            
            poolLetters = shuffleArray(letterObjects);
            while (poolLetters.map(o => o.letter).join('') === q.verb && q.letters.length > 1) {
                poolLetters = shuffleArray(letterObjects);
            }

            renderGame();
            showMessage("", "text-slate-700", "bg-transparent");
            
            checkBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            
            // Sonraki tuşu varsayılanı (sağ ok)
            nextBtn.innerHTML = `التّالي <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
            nextBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
            
            if (currentQuestionIndex === 0) {
                prevBtn.disabled = true;
                prevBtn.classList.add('opacity-50', 'cursor-not-allowed');
            } else {
                prevBtn.disabled = false;
                prevBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            }
        }

        function renderGame() {
            const q = questions[currentQuestionIndex];

            answerContainer.innerHTML = '';
            selectedLetters.forEach((letterObj, idx) => {
                const letterEl = document.createElement('button');
                letterEl.className = 'arabic-text word-item bg-white border-2 border-sky-400 text-sky-600 font-bold w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-xl shadow-sm text-xl sm:text-2xl md:text-3xl flex items-center justify-center transition-all select-none';
                letterEl.textContent = letterObj.letter;
                
                letterEl.addEventListener('click', () => {
                    if (isQuestionAnswered) return;
                    playClickSound();
                    selectedLetters.splice(idx, 1);
                    poolLetters.push(letterObj);
                    renderGame();
                });
                answerContainer.appendChild(letterEl);
            });

            const remainingCount = q.letters.length - selectedLetters.length;
            for (let i = 0; i < remainingCount; i++) {
                const slot = document.createElement('div');
                slot.className = 'w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-xl border-2 border-dashed border-sky-200 flex items-center justify-center text-sky-300 text-lg sm:text-2xl md:text-3xl font-bold select-none';
                slot.textContent = '..';
                answerContainer.appendChild(slot);
            }

            wordPool.innerHTML = '';
            poolLetters.forEach((letterObj, idx) => {
                const letterEl = document.createElement('button');
                letterEl.className = 'arabic-text word-item bg-white border-2 border-slate-300 text-slate-800 font-bold w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-xl shadow-sm text-xl sm:text-2xl md:text-3xl flex items-center justify-center transition-all select-none';
                letterEl.textContent = letterObj.letter;
                
                letterEl.addEventListener('click', () => {
                    if (isQuestionAnswered) return;
                    playClickSound();
                    poolLetters.splice(idx, 1);
                    selectedLetters.push(letterObj);
                    renderGame();
                });
                wordPool.appendChild(letterEl);
            });
        }

        function showMessage(text, textClass, bgClass) {
            messageArea.textContent = text;
            messageArea.className = `shrink-0 h-auto min-h-[1.5rem] py-0.5 mb-1 font-bold text-xs sm:text-sm flex items-center justify-center w-full rounded-lg transition-colors duration-300 arabic-text text-center px-2 ${textClass} ${bgClass}`;
        }

        checkBtn.addEventListener('click', () => {
            if (isQuestionAnswered) return;

            if (poolLetters.length > 0) {
                 playWrongSound();
                 showMessage("يُرْجى اِسْتِخْدام جَميع الحُروف لِتَكْوين الفِعْل.", "text-orange-700", "bg-orange-100");
                 return;
            }

            const userSpelling = selectedLetters.map(o => o.letter).join('');
            const correctVerb = questions[currentQuestionIndex].verb;

            if (userSpelling === correctVerb) {
                playCorrectSound();
                isQuestionAnswered = true;
                
                if (!solvedQuestions.has(currentQuestionIndex)) {
                    score += 10;
                    solvedQuestions.add(currentQuestionIndex);
                    scoreDisplay.textContent = score;
                }
                
                showMessage("رائِع! إِجابَة صَحيحَة", "text-emerald-700", "bg-emerald-100");
                
                answerContainer.innerHTML = '';
                selectedLetters.forEach(letterObj => {
                    const letterEl = document.createElement('div');
                    letterEl.className = 'arabic-text bg-emerald-50 border-2 border-emerald-400 text-emerald-700 font-bold w-10 h-10 sm:w-12 sm:h-12 md:w-14 md:h-14 rounded-xl shadow-sm text-xl sm:text-2xl md:text-3xl flex items-center justify-center select-none';
                    letterEl.textContent = letterObj.letter;
                    answerContainer.appendChild(letterEl);
                });

                checkBtn.classList.add('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                nextBtn.classList.remove('opacity-50', 'cursor-not-allowed', 'pointer-events-none');
                
                if (currentQuestionIndex === questions.length - 1) {
                    // Son sorudayken "Sonuçlar" ok yönü
                    nextBtn.innerHTML = `النَّتائِج <svg class="w-4 h-4 sm:w-5 sm:h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>`;
                }
                
                createConfetti(25);

            } else {
                playWrongSound();
                showMessage("التَّرْتيب خاطِئ، حَاوِلْ مَرَّةً أُخْرى!", "text-red-700", "bg-red-100");
                
                answerContainer.classList.add('animate-bounce');
                setTimeout(() => answerContainer.classList.remove('animate-bounce'), 500);
            }
        });

        nextBtn.addEventListener('click', () => {
            if (currentQuestionIndex < questions.length - 1) {
                currentQuestionIndex++;
                loadQuestion();
            } else {
                showEndScreen();
            }
        });

        prevBtn.addEventListener('click', () => {
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        });

        function showEndScreen() {
            endScreen.classList.remove('hidden');
            finalScoreEl.textContent = score;
            if(score === questions.length * 10) {
                createConfetti(100);
            }
        }

        restartBtn.addEventListener('click', () => {
            currentQuestionIndex = 0;
            score = 0;
            solvedQuestions.clear();
            scoreDisplay.textContent = score;
            endScreen.classList.add('hidden');
            questions = shuffleArray(questions);
            loadQuestion();
        });

        function createConfetti(amount) {
            const colors = ['#38bdf8', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6'];
            for (let i = 0; i < amount; i++) {
                const confetti = document.createElement('div');
                confetti.classList.add('confetti');
                
                confetti.style.left = Math.random() * 100 + 'vw';
                confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.animationDelay = Math.random() * 3 + 's';
                confetti.style.animationDuration = Math.random() * 2 + 2 + 's';
                
                if (Math.random() > 0.5) {
                    confetti.style.borderRadius = '50%';
                }

                document.body.appendChild(confetti);
                
                setTimeout(() => {
                    confetti.remove();
                }, 5000);
            }
        }

        window.onload = () => {
            questions = shuffleArray(questions);
            loadQuestion();
        };
    </script>
</body>
</html>
