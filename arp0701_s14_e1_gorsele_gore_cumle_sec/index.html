    <script>
        const routineSteps = [

            { id: 3, image: "S14_AİLESİYLEKAHVALTI.png", correctSentence: "أَتَناوَلُ الفَطور مَع عائِلَتي.", fallbackIcon: `<svg class="text-sky-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path></svg>` },
            { id: 4, image: "S14_GİYİNİYORKIZ.png", correctSentence: "أَلْبَسُ مَلابِسي.", fallbackIcon: `<svg class="text-indigo-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>` },
            { id: 5, image: "S5_OKULAGİDİYORUM.png", correctSentence: "أَذْهَبُ إِلى المَدْرَسَة.", fallbackIcon: `<svg class="text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>` },
            { id: 6, image: "S14_EVEGİDİYORUM.png", correctSentence: "أَرْجِعُ إِلى البَيْت ظُهْرًا.", fallbackIcon: `<svg class="text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>` },
            { id: 7, image: "S14_ANNESİNEYARDIM.png", correctSentence: "أُساعِدُ أُمّي في البَيْت.", fallbackIcon: `<svg class="text-pink-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.318 6.318a4.5 4.5 0 000 6.364L12 20.364l7.682-7.682a4.5 4.5 0 00-6.364-6.364L12 7.636l-1.318-1.318a4.5 4.5 0 00-6.364 0z"></path></svg>` },
            { id: 8, image: "S14_DERSÇALIŞIYOR.png", correctSentence: "أَدْرُسُ دُروسي مَساءً.", fallbackIcon: `<svg class="text-cyan-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.168.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477-4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path></svg>` },
            { id: 9, image: "S5_YATSIKILIYOR.png", correctSentence: "أُصَلّي العِشاء.", fallbackIcon: `<svg class="text-purple-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>` },
            { id: 10, image: "S5_UYUYANKIZ.png", correctSentence: "أَنامُ لَيْلًا.", fallbackIcon: `<svg class="text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path></svg>` }
        ];

        let quizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let userAnswers = []; 
        let selectedOption = null;

        // Sounds setup
        let clickSynth, correctSynth, wrongSynth;
        let audioSupported = false;
        const introAudio = new Audio('e4.mp3');

        try {
            if (typeof Tone !== 'undefined') {
                clickSynth = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                correctSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "triangle" }, envelope: { attack: 0.05, decay: 0.2, sustain: 0.2, release: 0.8 } }).toDestination();
                wrongSynth = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.2, sustain: 0, release: 0.2 } }).toDestination();
                audioSupported = true;
            }
        } catch (e) { console.warn("Tone.js setup failed:", e); }

        async function playSound(type) {
            if (!audioSupported) return;
            try { 
                await Tone.start(); 
                if (type === 'click' && clickSynth) clickSynth.triggerAttackRelease("C5", "16n");
                if (type === 'correct' && correctSynth) correctSynth.triggerAttackRelease(["C5", "E5", "G5"], "8n");
                if (type === 'wrong' && wrongSynth) wrongSynth.triggerAttackRelease("C3", "8n");
            } catch (e) {}
        }

        // Helpers
        const shuffleArray = (arr) => [...arr].sort(() => Math.random() - 0.5);
        const toArabicNum = (num) => {
            const map = { '0':'٠', '1':'١', '2':'٢', '3':'٣', '4':'٤', '5':'٥', '6':'٦', '7':'٧', '8':'٨', '9':'٩' };
            return num.toString().split('').map(c => map[c] || c).join('');
        };

        function generateQuiz() {
            quizData = shuffleArray(routineSteps).map(step => {
                let options = [step.correctSentence];
                let otherSentences = routineSteps.filter(s => s.id !== step.id).map(s => s.correctSentence);
                otherSentences = shuffleArray(otherSentences);
                options.push(otherSentences[0], otherSentences[1]);
                
                return {
                    image: step.image,
                    fallbackIcon: step.fallbackIcon,
                    correct: step.correctSentence,
                    options: shuffleArray(options)
                };
            });
            userAnswers = new Array(quizData.length).fill(null);
            currentQuestionIndex = 0;
            score = 0;
            updateUI();
            loadQuestion();
        }

        function loadQuestion() {
            if (currentQuestionIndex >= quizData.length) {
                showEndScreen();
                return;
            }
            
            const q = quizData[currentQuestionIndex];
            const answeredState = userAnswers[currentQuestionIndex];
            selectedOption = null;
            
            // Set Image
            const imgEl = document.getElementById('question-image');
            const fallbackEl = document.getElementById('question-fallback');
            
            imgEl.classList.add('opacity-0');
            setTimeout(() => {
                imgEl.src = q.image;
                imgEl.classList.remove('hidden');
                fallbackEl.classList.add('hidden');
            }, 150); 

            imgEl.onload = () => imgEl.classList.remove('opacity-0');
            imgEl.onerror = () => {
                imgEl.classList.add('hidden');
                fallbackEl.innerHTML = q.fallbackIcon;
                fallbackEl.classList.remove('hidden');
            };

            // Set Options
            const optionsContainer = document.getElementById('options-container');
            optionsContainer.innerHTML = '';
            
            q.options.forEach((optText, index) => {
                const btn = document.createElement('button');
                // Cümle puntosu büyütüldü ve iç boşluklar biraz azaltıldı
                btn.className = "option-btn w-full bg-white border-2 text-slate-700 arabic-text text-[22px] sm:text-[26px] lg:text-[30px] font-extrabold py-3 sm:py-4 px-4 sm:px-6 rounded-2xl sm:rounded-3xl shadow-sm text-right flex items-center justify-between transition-colors";
                
                let borderClass = 'border-slate-200';
                let bgClass = 'bg-white';
                let textClass = 'text-slate-700';
                let circleBorder = 'border-slate-300';
                let circleBg = '';
                let circleContent = '';

                if (answeredState) {
                    btn.style.cursor = 'default';
                    if (optText === q.correct) {
                        borderClass = 'border-emerald-500';
                        bgClass = 'bg-emerald-50';
                        textClass = 'text-emerald-700';
                        circleBorder = 'border-emerald-500';
                        circleBg = 'bg-emerald-500';
                        circleContent = `<svg class="w-full h-full text-white p-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                    } else if (optText === answeredState.selected && !answeredState.isCorrect) {
                        borderClass = 'border-red-400';
                        bgClass = 'bg-red-50';
                        textClass = 'text-red-700';
                        circleBorder = 'border-red-400';
                        circleBg = 'bg-red-400';
                        circleContent = `<svg class="w-full h-full text-white p-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                    } else {
                        btn.classList.add('opacity-50');
                    }
                } else {
                    btn.classList.add('hover:shadow-md', 'hover:border-sky-300', 'hover:bg-sky-50');
                    btn.onclick = () => selectOption(optText, btn);
                }

                btn.classList.add(borderClass, bgClass, textClass);

                btn.innerHTML = `
                    <span class="flex-1 text-right leading-relaxed">${optText}</span>
                    <span class="w-8 h-8 rounded-full border-2 ${circleBorder} ${circleBg} flex-shrink-0 ml-4 option-circle flex items-center justify-center transition-colors">${circleContent}</span>
                `;
                
                optionsContainer.appendChild(btn);
            });

            // Update Nav Buttons
            document.getElementById('prev-btn').disabled = (currentQuestionIndex === 0);
            document.getElementById('check-btn').disabled = true; // Seçim yapana kadar inaktif
            document.getElementById('next-btn').disabled = !answeredState; // Kontrol edene kadar inaktif

            updateUI();
        }

        function selectOption(selectedText, btnEl) {
            if (userAnswers[currentQuestionIndex]) return; 
            
            playSound('click');
            selectedOption = selectedText;

            const allBtns = document.getElementById('options-container').querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                b.classList.remove('border-sky-400', 'bg-sky-50', 'text-sky-700');
                b.classList.add('border-slate-200', 'bg-white', 'text-slate-700');
                const circle = b.querySelector('.option-circle');
                circle.classList.remove('border-sky-400');
                circle.classList.add('border-slate-300');
                circle.innerHTML = '';
            });

            btnEl.classList.remove('border-slate-200', 'bg-white', 'text-slate-700');
            btnEl.classList.add('border-sky-400', 'bg-sky-50', 'text-sky-700');
            
            const circle = btnEl.querySelector('.option-circle');
            circle.classList.remove('border-slate-300');
            circle.classList.add('border-sky-400');
            circle.innerHTML = `<div class="w-4 h-4 rounded-full bg-sky-500"></div>`;

            document.getElementById('check-btn').disabled = false;
        }

        function checkAnswer() {
            if (!selectedOption || userAnswers[currentQuestionIndex]) return;

            const q = quizData[currentQuestionIndex];
            const isCorrect = (selectedOption === q.correct);

            if (isCorrect) score += 10;
            
            userAnswers[currentQuestionIndex] = {
                selected: selectedOption,
                isCorrect: isCorrect
            };

            const allBtns = document.getElementById('options-container').querySelectorAll('.option-btn');
            allBtns.forEach(b => {
                const optText = b.querySelector('span').innerText.trim();
                b.style.cursor = 'default';
                b.onclick = null;
                const circle = b.querySelector('.option-circle');

                if (optText === q.correct) {
                    b.classList.remove('border-slate-200', 'bg-white', 'text-slate-700', 'border-sky-400', 'bg-sky-50', 'text-sky-700');
                    b.classList.add('border-emerald-500', 'bg-emerald-50', 'text-emerald-700');
                    circle.classList.remove('border-slate-300', 'border-sky-400');
                    circle.classList.add('border-emerald-500', 'bg-emerald-500');
                    circle.innerHTML = `<svg class="w-full h-full text-white p-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M5 13l4 4L19 7"></path></svg>`;
                } else if (optText === selectedOption && !isCorrect) {
                    b.classList.remove('border-sky-400', 'bg-sky-50', 'text-sky-700');
                    b.classList.add('border-red-400', 'bg-red-50', 'text-red-700', 'shake-effect');
                    circle.classList.remove('border-sky-400');
                    circle.classList.add('border-red-400', 'bg-red-400');
                    circle.innerHTML = `<svg class="w-full h-full text-white p-1" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M6 18L18 6M6 6l12 12"></path></svg>`;
                } else {
                    b.classList.add('opacity-50');
                }
            });

            if (isCorrect) playSound('correct');
            else playSound('wrong');

            updateUI();

            document.getElementById('check-btn').disabled = true;
            document.getElementById('next-btn').disabled = false; 
            selectedOption = null; 
        }

        function nextQuestion() {
            playSound('click');
            if (currentQuestionIndex + 1 >= quizData.length) {
                if (userAnswers.every(ans => ans !== null)) {
                    showEndScreen();
                } else {
                    const nextUnanswered = userAnswers.findIndex(ans => ans === null);
                    currentQuestionIndex = nextUnanswered !== -1 ? nextUnanswered : currentQuestionIndex + 1;
                    if(currentQuestionIndex >= quizData.length) showEndScreen();
                    else loadQuestion();
                }
            } else {
                currentQuestionIndex++;
                loadQuestion();
            }
        }

        function prevQuestion() {
            playSound('click');
            if (currentQuestionIndex > 0) {
                currentQuestionIndex--;
                loadQuestion();
            }
        }

        function updateUI() {
            document.getElementById('score-display').textContent = toArabicNum(score);
            document.getElementById('question-counter').textContent = toArabicNum(currentQuestionIndex + 1 > 10 ? 10 : currentQuestionIndex + 1);
            
            const answeredCount = userAnswers.filter(ans => ans !== null).length;
            const progressPct = (answeredCount / quizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progressPct}%`;
        }

        function showEndScreen() {
            playSound('correct'); // Fanfare
            document.getElementById('end-screen').classList.remove('hidden');
            document.getElementById('final-score-val').textContent = toArabicNum(score);
            createConfetti(60);
        }

        function createConfetti(amount) {
            const colors = ['#ef4444', '#3b82f6', '#10b981', '#f59e0b', '#8b5cf6', '#ec4899'];
            for (let i = 0; i < amount; i++) {
                const c = document.createElement('div');
                c.className = 'confetti';
                c.style.left = Math.random() * 100 + 'vw';
                c.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                c.style.animationDelay = Math.random() * 1.5 + 's';
                c.style.animationDuration = Math.random() * 2 + 2 + 's';
                if (Math.random() > 0.5) c.style.borderRadius = '50%';
                document.body.appendChild(c);
                setTimeout(() => c.remove(), 4000);
            }
        }

        // Listeners
        document.getElementById('start-btn').addEventListener('click', async () => {
            if (audioSupported) { try { await Tone.start(); playSound('click'); } catch(e){} }
            introAudio.play().catch(e => console.log("Auto-play blocked"));
            document.getElementById('start-screen').classList.add('hidden');
            triggerAutoFullscreen();
            generateQuiz();
        });

        document.getElementById('restart-btn').addEventListener('click', () => {
            document.getElementById('end-screen').classList.add('hidden');
            playSound('click');
            generateQuiz();
        });

        // Fullscreen Logic ve Görünüm İyileştirmesi
        const fsBtn = document.getElementById('fullscreen-btn');
        const iconEnter = document.getElementById('fullscreen-icon-enter');
        const iconExit = document.getElementById('fullscreen-icon-exit');
        const appContainer = document.getElementById('app-container');

        function toggleFullscreen() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(e=>{});
            } else {
                document.exitFullscreen().catch(e=>{});
            }
        }
        function triggerAutoFullscreen() { if (!document.fullscreenElement) document.documentElement.requestFullscreen().catch(e=>{}); }

        fsBtn.addEventListener('click', () => { playSound('click'); toggleFullscreen(); });
        
        document.addEventListener('fullscreenchange', () => {
            if (document.fullscreenElement) {
                iconEnter.classList.add('hidden'); iconExit.classList.remove('hidden');
                // Tam ekrana geçildiğinde köşeleri ve çerçeveyi kaldır
                appContainer.classList.remove('sm:rounded-3xl', 'sm:border-4');
            } else {
                iconEnter.classList.remove('hidden'); iconExit.classList.add('hidden');
                // Tam ekrandan çıkıldığında köşeleri ve çerçeveyi geri getir
                appContainer.classList.add('sm:rounded-3xl', 'sm:border-4');
            }
        });
        
    </script>
</body>
</html>
